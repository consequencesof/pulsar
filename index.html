<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover" />
  <title>Pulsar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --bg-dark: #000000;
      --bg-card: #0a0a0f;
      --accent: #7C3AED;
      --accent-glow: #A855F7;
      --text: #FFFFFF;
      --text-muted: #9CA3AF;
      --border: rgba(124, 58, 237, 0.4);
      --border-light: rgba(124, 58, 237, 0.2);
      --msg-mine: rgba(124, 58, 237, 0.85);
      --msg-theirs: rgba(30, 30, 40, 0.8);
      --glow-color: rgba(124, 58, 237, 0.3);
    }

    [data-theme="default"] {
      --bg-dark: #000000;
      --bg-card: #0a0a0f;
      --accent: #7C3AED;
      --accent-glow: #A855F7;
      --border: rgba(124, 58, 237, 0.4);
      --border-light: rgba(124, 58, 237, 0.2);
      --msg-mine: rgba(124, 58, 237, 0.85);
      --msg-theirs: rgba(30, 30, 40, 0.8);
      --glow-color: rgba(124, 58, 237, 0.3);
    }
    
    [data-theme="greenblack"] {
      --bg-dark: #000000;
      --bg-card: #0a1a0a;
      --accent: #10B981;
      --accent-glow: #34D399;
      --border: rgba(16, 185, 129, 0.4);
      --border-light: rgba(16, 185, 129, 0.2);
      --msg-mine: rgba(16, 185, 129, 0.85);
      --msg-theirs: rgba(30, 35, 30, 0.8);
      --glow-color: rgba(16, 185, 129, 0.3);
    }

    body {
      background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-card) 50%, var(--bg-dark) 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s ease;
    }
    
    body.liquid-glass .glass-card {
      backdrop-filter: blur(20px);
      background: rgba(10, 10, 15, 0.55);
      border: 1px solid var(--border);
    }

    .glass-card {
      background: var(--bg-card);
      border-radius: 28px;
      border: 1px solid var(--border-light);
      transition: all 0.3s ease;
      box-shadow: 0 0 20px var(--glow-color);
    }

    .pulsar-title {
      background: linear-gradient(90deg, #FFFFFF 0%, var(--accent) 50%, var(--accent-glow) 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      animation: gradient-shift 2.5s ease infinite alternate;
    }
    @keyframes gradient-shift {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    .message-bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 20px;
      word-break: break-word;
      animation: fadeSlideUp 0.2s ease-out;
    }
    @keyframes fadeSlideUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .chat-item {
      transition: all 0.2s ease;
      border-radius: 16px;
      cursor: pointer;
    }
    .chat-item:hover { background: rgba(124, 58, 237, 0.15); transform: translateX(4px); }
    .chat-item-active { background: rgba(124, 58, 237, 0.25); border-left: 3px solid var(--accent); }

    .snow-flake {
      position: fixed;
      pointer-events: none;
      background: white !important;
      border-radius: 50%;
      opacity: 0.6;
      z-index: 9999;
    }
    @keyframes fall {
      0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.6; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

    button { cursor: pointer; transition: all 0.15s ease; background: none; border: none; }
    button:active { transform: scale(0.97); }
    
    input, textarea {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border-light);
      border-radius: 20px;
      padding: 12px 16px;
      color: var(--text);
      outline: none;
      transition: all 0.2s;
      width: 100%;
    }
    input:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(124, 58, 237, 0.2);
    }
    
    /* Кастомный аудиоплеер */
    .custom-audio {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0,0,0,0.5);
      padding: 6px 12px;
      border-radius: 32px;
      min-width: 160px;
    }
    .audio-play-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: var(--accent);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      cursor: pointer;
    }
    .audio-wave {
      flex: 1;
      height: 32px;
      display: flex;
      align-items: center;
      gap: 3px;
    }
    .audio-wave span {
      width: 3px;
      background: var(--accent-glow);
      border-radius: 2px;
      transition: height 0.05s linear;
    }
    .audio-time {
      font-size: 11px;
      color: var(--text-muted);
      min-width: 40px;
      font-family: monospace;
    }

    .custom-checkbox {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      cursor: pointer;
    }
    .custom-checkbox.checked {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent-glow);
    }
    .custom-checkbox.checked::after {
      content: '✓';
      color: white;
      font-size: 12px;
      font-weight: bold;
    }
    
    .custom-select {
      position: relative;
      width: 100%;
    }
    .select-trigger {
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid var(--border-light);
      border-radius: 20px;
      padding: 12px 16px;
      color: var(--text);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .select-trigger:hover {
      border-color: var(--accent);
    }
    .select-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      border-radius: 16px;
      margin-top: 8px;
      overflow: hidden;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-10px);
      transition: all 0.25s ease;
    }
    .select-dropdown.open {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    .select-option {
      padding: 12px 16px;
      cursor: pointer;
    }
    .select-option:hover {
      background: rgba(124, 58, 237, 0.2);
    }
    
    .hidden { display: none; }
    
    .mobile-nav {
      display: none;
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border-top: 1px solid var(--border-light);
      padding: 12px 24px;
      justify-content: space-around;
      z-index: 100;
      backdrop-filter: blur(10px);
    }
    .mobile-nav button {
      font-size: 24px;
      padding: 8px;
      border-radius: 12px;
      transition: all 0.2s;
    }
    .mobile-nav button.active {
      background: rgba(124, 58, 237, 0.3);
      color: var(--accent);
    }
    
    @media (max-width: 768px) {
      .mobile-nav {
        display: flex;
      }
      .desktop-sidebar {
        display: none !important;
      }
      .mobile-view {
        display: flex !important;
        flex-direction: column;
        height: 100%;
      }
      .app-container {
        padding-bottom: 70px;
        height: 100vh;
        display: flex;
        flex-direction: column;
      }
    }
  </style>
</head>
<body data-theme="default">
  <div id="snowContainer" style="position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 9999;"></div>

  <!-- АВТОРИЗАЦИЯ -->
  <div id="authView" class="min-h-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-md text-center mb-10">
      <h1 class="text-6xl md:text-7xl font-bold pulsar-title tracking-tight">Pulsar</h1>
    </div>
    <div class="glass-card w-full max-w-md p-6">
      <div class="flex gap-2 mb-6">
        <button id="loginTab" class="flex-1 py-2 rounded-full font-medium bg-white/5">Вход</button>
        <button id="registerTab" class="flex-1 py-2 rounded-full font-medium">Регистрация</button>
      </div>
      <form id="loginForm" class="space-y-4">
        <input id="loginUsername" placeholder="@username" />
        <input id="loginPassword" type="password" placeholder="Пароль" />
        <button type="submit" class="w-full py-3 rounded-full font-semibold" style="background: var(--accent); color: white;">Войти</button>
      </form>
      <form id="registerForm" class="space-y-4 hidden">
        <input id="regUsername" placeholder="@username" />
        <input id="regNickname" placeholder="Nickname" />
        <input id="regPassword" type="password" placeholder="Пароль" />
        <button type="submit" class="w-full py-3 rounded-full font-semibold" style="background: var(--accent); color: white;">Создать</button>
      </form>
      <p id="authError" class="mt-4 text-sm text-red-400 text-center"></p>
    </div>
  </div>

  <!-- МОДАЛКИ -->
  <div id="profileModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm items-center justify-center p-4 z-50">
    <div class="glass-card w-full max-w-md p-6 text-center">
      <img id="profileAvatar" class="w-24 h-24 rounded-full mx-auto object-cover border-2" style="border-color: var(--accent);" src="" />
      <h3 id="profileNick" class="text-xl font-bold mt-3"></h3>
      <p id="profileUsername" class="text-gray-400 text-sm mt-1"></p>
      <div id="profileNftBlock" class="mt-3 p-3 rounded-xl bg-white/5 hidden">
        <p class="text-xs text-gray-400">А также</p>
        <p id="profileNft" class="text-[var(--accent)] font-mono"></p>
      </div>
      <div id="profileAnonBlock" class="mt-2 p-3 rounded-xl bg-white/5 hidden">
        <p class="text-xs text-gray-400">Анонимный номер</p>
        <p id="profileAnon" class="font-mono"></p>
      </div>
      <button id="closeProfile" class="mt-5 w-full py-2 rounded-xl bg-white/10">Закрыть</button>
    </div>
  </div>

  <div id="editProfileModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm items-center justify-center p-4 z-50">
    <div class="glass-card w-full max-w-md p-6">
      <h3 class="text-xl font-semibold text-center mb-4">Редактировать</h3>
      <div class="text-center mb-4">
        <img id="editAvatarPreview" class="w-20 h-20 rounded-full mx-auto object-cover border-2" style="border-color: var(--accent);" src="" />
        <input type="file" id="avatarFile" accept="image/*" class="mt-2 text-sm bg-transparent" />
      </div>
      <input id="editNickname" placeholder="Nickname" class="mb-3" />
      <input id="editUsername" placeholder="@username" class="mb-3" />
      <button id="saveProfileBtn" class="w-full py-2 rounded-xl font-semibold mb-2" style="background: var(--accent);">Сохранить</button>
      <button id="closeEditProfile" class="w-full py-2 rounded-xl bg-white/10">Отмена</button>
    </div>
  </div>

  <div id="deleteChatModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm items-center justify-center p-4 z-50">
    <div class="glass-card w-full max-w-sm p-6 text-center">
      <h3 class="text-xl font-semibold mb-3">Удалить чат?</h3>
      <button id="deleteForMeBtn" class="w-full py-2 rounded-xl bg-white/10 mb-2">Только у меня</button>
      <button id="deleteForBothBtn" class="w-full py-2 rounded-xl bg-red-500/20 mb-2 text-red-400">У всех</button>
      <button id="cancelDeleteBtn" class="w-full py-2 rounded-xl" style="background: var(--accent);">Отмена</button>
    </div>
  </div>

  <div id="confirmLogoutModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm items-center justify-center p-4 z-50">
    <div class="glass-card w-full max-w-sm p-6 text-center">
      <h3 class="text-xl font-semibold mb-3">Выйти из аккаунта?</h3>
      <button id="confirmLogoutBtn" class="w-full py-2 rounded-xl bg-red-500/20 mb-2 text-red-400">Выйти</button>
      <button id="cancelLogoutBtn" class="w-full py-2 rounded-xl" style="background: var(--accent);">Отмена</button>
    </div>
  </div>

  <!-- ГЛАВНОЕ ПРИЛОЖЕНИЕ -->
  <div id="appView" class="hidden app-container" style="height: 100vh; display: flex; flex-direction: column;">
    <!-- Десктопный вид -->
    <div class="desktop-sidebar" style="display: flex; height: 100%; padding: 12px; gap: 12px;">
      <div class="glass-card" style="width: 320px; padding: 16px; display: flex; flex-direction: column; overflow: hidden;">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-3 cursor-pointer" id="myProfileBtn">
            <img id="myAvatar" class="w-12 h-12 rounded-full object-cover border-2" style="border-color: var(--accent);" src="" />
            <div>
              <h2 class="text-xl font-bold pulsar-title">Pulsar</h2>
              <p id="myUsernameLabel" class="text-sm text-gray-400"></p>
            </div>
          </div>
          <button id="openSettings" class="w-10 h-10 rounded-full bg-white/10 text-xl">⚙️</button>
        </div>
        <div class="flex gap-2 mb-3">
          <input id="searchInput" placeholder="Поиск @username" />
          <button id="searchBtn" class="px-4 rounded-full bg-white/10">🔍</button>
        </div>
        <div id="searchResult" class="text-sm mb-3"></div>
        <p class="text-xs text-gray-400 mb-2">ЧАТЫ</p>
        <div id="chatList" class="flex-1 overflow-y-auto space-y-1"></div>
      </div>
      
      <div class="glass-card" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
        <div class="px-4 py-3 border-b border-white/10 flex items-center justify-between">
          <div>
            <h3 id="chatTitle" class="font-semibold text-lg">Нет диалога</h3>
            <p id="chatStatus" class="text-xs text-gray-400"></p>
          </div>
          <button id="deleteChatBtn" class="w-10 h-10 rounded-full bg-white/10 hidden">🗑️</button>
        </div>
        <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-2"></div>
        <form id="messageForm" class="p-3 border-t border-white/10 flex gap-2 items-center">
          <input id="messageInput" placeholder="Сообщение..." class="flex-1" />
          <button type="button" id="photoBtn" class="w-10 h-10 rounded-full bg-white/10 text-lg">🖼️</button>
          <button type="button" id="voiceBtn" class="w-10 h-10 rounded-full bg-white/10 text-lg relative">
            🎙️
            <span id="recordingIndicator" class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full hidden"></span>
          </button>
          <button type="submit" class="w-10 h-10 rounded-full font-bold" style="background: var(--accent);">➤</button>
        </form>
        <input type="file" id="photoInput" accept="image/*" style="display: none;" />
      </div>
    </div>

    <!-- Мобильный вид (без поиска сверху) -->
    <div class="mobile-view" style="display: none; height: 100%; flex-direction: column;">
      <div class="glass-card" style="flex: 1; margin: 12px; display: flex; flex-direction: column; overflow: hidden;">
        <div class="px-4 py-3 border-b border-white/10 flex items-center gap-3">
          <img id="mobileMyAvatar" class="w-10 h-10 rounded-full object-cover border-2" style="border-color: var(--accent);" src="" />
          <div>
            <h2 class="text-lg font-bold pulsar-title">Pulsar</h2>
            <p id="mobileMyUsernameLabel" class="text-xs text-gray-400"></p>
          </div>
        </div>
        
        <div class="px-3">
          <p class="text-xs text-gray-400 mb-2">ЧАТЫ</p>
          <div id="mobileChatList" class="flex-1 overflow-y-auto space-y-1" style="max-height: 70vh;"></div>
        </div>
        
        <div class="flex-1 flex flex-col min-h-0" style="margin-top: auto;">
          <div class="px-3 py-2 border-t border-b border-white/10">
            <h3 id="mobileChatTitle" class="font-semibold">Нет диалога</h3>
            <p id="mobileChatStatus" class="text-xs text-gray-400"></p>
          </div>
          <div id="mobileMessages" class="flex-1 overflow-y-auto p-3 space-y-2" style="min-height: 200px;"></div>
          <form id="mobileMessageForm" class="p-3 border-t border-white/10 flex gap-2 items-center">
            <input id="mobileMessageInput" placeholder="Сообщение..." class="flex-1" />
            <button type="button" id="mobilePhotoBtn" class="w-10 h-10 rounded-full bg-white/10 text-lg">🖼️</button>
            <button type="button" id="mobileVoiceBtn" class="w-10 h-10 rounded-full bg-white/10 text-lg relative">
              🎙️
              <span id="mobileRecordingIndicator" class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full hidden"></span>
            </button>
            <button type="submit" class="w-10 h-10 rounded-full font-bold" style="background: var(--accent);">➤</button>
          </form>
          <input type="file" id="mobilePhotoInput" accept="image/*" style="display: none;" />
        </div>
      </div>
    </div>

    <!-- Нижняя навигация -->
    <div class="mobile-nav">
      <button id="navChatsBtn" class="active">💬</button>
      <button id="navProfileBtn">👤</button>
      <button id="navSettingsBtn">⚙️</button>
    </div>
  </div>

  <!-- НАСТРОЙКИ -->
  <div id="settingsModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm items-center justify-center p-4 z-40">
    <div class="glass-card w-full max-w-md p-6 max-h-[90vh] overflow-y-auto">
      <div class="flex justify-between mb-4"><h3 class="text-xl font-semibold">Настройки</h3><button id="closeSettings" class="w-8 h-8 rounded-full bg-white/10">✕</button></div>
      <div class="space-y-4">
        <div class="custom-select" id="themeSelectContainer">
          <div class="select-trigger" id="themeSelectTrigger">
            <span id="selectedThemeText">Default</span>
            <span>▼</span>
          </div>
          <div class="select-dropdown" id="themeSelectDropdown">
            <div class="select-option" data-value="default">Default</div>
            <div class="select-option" data-value="greenblack">GreenBlack</div>
          </div>
        </div>
        <div class="flex items-center justify-between">
          <span>Liquid Glass</span>
          <div id="liquidGlassToggle" class="custom-checkbox"></div>
        </div>
        <div class="flex items-center justify-between">
          <span>Скрыть статус</span>
          <div id="hideStatusToggle" class="custom-checkbox"></div>
        </div>
        <hr class="border-white/10" />
        <div>
          <div class="flex items-center justify-between mb-2">
            <span>Снегопад</span>
            <div id="snowToggle" class="custom-checkbox"></div>
          </div>
          <div class="mt-3">
            <div class="flex justify-between text-sm mb-1">Количество: <span id="snowCountVal">40</span></div>
            <input type="range" id="snowCount" min="0" max="150" value="40" class="w-full" />
          </div>
          <div class="mt-3">
            <div class="flex justify-between text-sm mb-1">Размер: <span id="snowSizeVal">4</span> px</div>
            <input type="range" id="snowSize" min="2" max="10" step="1" value="4" class="w-full" />
          </div>
          <div class="mt-3">
            <div class="flex justify-between text-sm mb-1">Скорость: <span id="snowSpeedVal">6</span> сек</div>
            <input type="range" id="snowSpeed" min="3" max="12" step="1" value="6" class="w-full" />
          </div>
        </div>
        <button id="saveSettingsBtn" class="w-full py-2 rounded-xl font-semibold" style="background: var(--accent);">Сохранить</button>
        <button id="logoutSettingsBtn" class="w-full py-2 rounded-xl font-semibold bg-red-500/20 text-red-400">Выйти</button>
        <p id="settingsInfo" class="text-sm text-center"></p>
        <div class="text-center pt-2"><button id="adminTrigger" class="text-sm text-gray-400">*</button></div>
      </div>
    </div>
  </div>

  <!-- АДМИНКА -->
  <div id="adminModal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm items-center justify-center p-4 z-45">
    <div class="glass-card w-full max-w-md p-6">
      <h3 class="text-xl font-semibold mb-3">Админ-панель</h3>
      <input id="adminUsername" placeholder="@username" class="mb-3" />
      <input id="nftUsernameInput" placeholder="NFT @username" class="mb-2" />
      <button id="grantNftBtn" class="w-full py-2 rounded-xl bg-white/10 mb-3">Выдать NFT @</button>
      <input id="manualAnonNumber" placeholder="+888123456" class="mb-2" />
      <button id="setManualAnonBtn" class="w-full py-2 rounded-xl bg-white/10 mb-3">Установить номер</button>
      <button id="closeAdmin" class="w-full py-2 rounded-xl" style="background: var(--accent);">Закрыть</button>
      <p id="adminInfo" class="text-sm mt-2"></p>
    </div>
  </div>

    function loadSnowSettings() {
      const snowToggle = $('snowToggle');
      if (!snowToggle) return;
      const enabled = localStorage.getItem("pulsar_snow_enabled") === "1";
      const count = localStorage.getItem("pulsar_snow_count") || "40";
      const size = localStorage.getItem("pulsar_snow_size") || "4";
      const speed = localStorage.getItem("pulsar_snow_speed") || "6";
      if (enabled) snowToggle.classList.add('checked'); else snowToggle.classList.remove('checked');
      if ($('snowCount')) $('snowCount').value = count;
      if ($('snowSize')) $('snowSize').value = size;
      if ($('snowSpeed')) $('snowSpeed').value = speed;
      if ($('snowCountVal')) $('snowCountVal').innerText = count;
      if ($('snowSizeVal')) $('snowSizeVal').innerText = size;
      if ($('snowSpeedVal')) $('snowSpeedVal').innerText = speed;
      if (enabled) reloadSnow();
      else stopSnow();
    }
    
    function startSnow(count, size, speedSec) {
      const container = $('snowContainer'); if (!container) return;
      if (snowInterval) clearInterval(snowInterval);
      function createFlake() { 
        if (!getCheckboxValue($('snowToggle'))) return; 
        const flake = document.createElement("div"); 
        flake.classList.add("snow-flake"); 
        const sz = size + Math.random() * 4; 
        flake.style.width = sz + "px"; 
        flake.style.height = sz + "px"; 
        flake.style.left = Math.random() * 100 + "%"; 
        const duration = speedSec + Math.random() * 5; 
        flake.style.animation = `fall ${duration}s linear forwards`; 
        container.appendChild(flake); 
        setTimeout(() => flake.remove(), duration * 1000); 
      }
      const intervalTime = Math.max(100, Math.min(500, 3000 / Math.max(count, 1))); 
      snowInterval = setInterval(createFlake, intervalTime);
    }
    
    function stopSnow() { 
      if (snowInterval) { clearInterval(snowInterval); snowInterval = null; } 
      const c = $('snowContainer'); 
      if (c) c.innerHTML = ""; 
    }
    
    function reloadSnow() { 
      if (getCheckboxValue($('snowToggle'))) { 
        stopSnow(); 
        startSnow(parseInt($('snowCount')?.value || 40), parseInt($('snowSize')?.value || 4), parseInt($('snowSpeed')?.value || 6));

      const nickname = $('regNickname')?.value?.trim() || "";

        if (snapshot.exists()) { showError($('authError'), "@ уже занят"); return; } 
        const uid = db.ref("users").push().key;

        await db.ref(`users/${uid}`).set(user);

        currentUser = user;

      } catch(err) { showError($('authError'), err.message); }

    async function loginUser(e) {

      const pass = $('loginPassword')?.value || "";

        const snapshot = await db.ref("users").orderByChild("username_lc").equalTo(uname).get(); 
        if (!snapshot.exists()) { showError($('authError'), "Пользователь не найден"); return; } 
        const user = Object.values(snapshot.val())[0]; 
        if (user.password !== pass) { showError($('authError'), "Неверный пароль"); return; } 
        localStorage.setItem("pulsar_uid", user.uid); 
        currentUser = user; 
        await db.ref(`users/${user.uid}`).update({ online: true, last_seen: Date.now() }); 
        await enterApp(); 
      } catch(err) { showError($('authError'), err.message); }

      for (const chatIdKey in allMessages) { 
        const messages = allMessages[chatIdKey]; 
        for (const msgId in messages) { 
          const msg = messages[msgId]; 
          if (msg.senderUid === currentUser.uid) chatSet.add(msg.receiverUid); 
          if (msg.receiverUid === currentUser.uid) chatSet.add(msg.senderUid); 
        } 
      } 
      chatsList = Array.from(chatSet);

    function initAudioPlayer(container) {
      const btn = container.querySelector('.audio-play-btn');
      const waves = container.querySelectorAll('.audio-wave span');
      const timeSpan = container.querySelector('.audio-time');
      const audioSrc = container.getAttribute('data-audio');
      let audio = null;
      let isPlaying = false;
      let interval = null;
      
      if (!btn) return;
      
      btn.onclick = () => {
        if (audio && !audio.paused) {
          if (interval) clearInterval(interval);
          audio.pause();
          audio.currentTime = 0;
          btn.textContent = '▶';
          isPlaying = false;
          waves.forEach(w => w.style.height = '4px');
          timeSpan.textContent = '0:00';
          audio = null;
          return;
        }
        if (audio) {
          if (interval) clearInterval(interval);
          audio.pause();
        }
        audio = new Audio(audioSrc);
        audio.onplay = () => {
          isPlaying = true;
          btn.textContent = '⏸';
          interval = setInterval(() => {
            if (audio.paused || audio.ended) {
              clearInterval(interval);
              btn.textContent = '▶';
              isPlaying = false;
              waves.forEach(w => w.style.height = '4px');
              timeSpan.textContent = '0:00';
              return;
            }
            waves.forEach((w, i) => {
              const h = 4 + Math.sin(Date.now() / 200 + i) * 8;
              w.style.height = isPlaying ? `${h}px` : '4px';
            });
            const mins = Math.floor(audio.currentTime / 60);
            const secs = Math.floor(audio.currentTime % 60);
            timeSpan.textContent = `${mins}:${secs < 10 ? '0' + secs : secs}`;
          }, 100);
        };
        audio.play();
      };
    }
    
    async function openChat(uid) { 
      if (!uid || uid === selectedPartner) return;
      
      if (currentMessageRef && currentMessageRef.off) {
        currentMessageRef.off();
      }
      
      selectedPartner = uid; 
      renderChats(); 
      renderMobileChats();
      renderChatHeader(uid); 
      renderMobileChatHeader(uid);
      if ($('deleteChatBtn')) $('deleteChatBtn').classList.remove("hidden"); 
      
      const cid = chatId(currentUser.uid, uid); 
      const messagesRef = db.ref(`messages/${cid}`);
      currentMessageRef = messagesRef;
      
      messagesRef.off();
      messagesRef.on("value", (snap) => { 
        const msgs = []; 
        snap.forEach(child => { msgs.push({ id: child.key, ...child.val() }); }); 
        msgs.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0)); 
        
        function renderMessagesContainer(containerId) {
          const container = $(containerId);
          if (!container) return;
          container.innerHTML = msgs.map(m => { 
            let content = ''; 
            if (m.type === 'photo') { 
              content = `<img src="${m.text}" class="photo-message max-w-[200px] max-h-[200px] rounded-2xl cursor-pointer" onclick="window.open('${m.text}','_blank')" />`; 
            } else if (m.type === 'voice') { 
              content = `<div class="custom-audio" data-audio="${m.text}"><button class="audio-play-btn">▶</button><div class="audio-wave"><span></span><span></span><span></span><span></span><span></span></div><span class="audio-time">0:00</span></div>`; 
            } else { 
              content = escapeHtml(m.text || ""); 
            } 
            const isMine = m.senderUid === currentUser.uid; 
            return `<div class="${isMine ? "text-right" : "text-left"}"><div class="message-bubble inline-block" style="background: ${isMine ? 'var(--msg-mine)' : 'var(--msg-theirs)'}">${content}</div></div>`; 
          }).join(""); 
          container.scrollTop = container.scrollHeight;
          setTimeout(() => {
            container.querySelectorAll('.custom-audio').forEach(initAudioPlayer);
          }, 100);
        }
        
        renderMessagesContainer('messages');
        renderMessagesContainer('mobileMessages');
      }); 
    }

          const stream = await navigator.mediaDevices.getUserMedia({ audio: true }); 
          mediaRecorder = new MediaRecorder(stream); 
          audioChunks = []; 
          mediaRecorder.ondataavailable = event => audioChunks.push(event.data); 
          mediaRecorder.onstop = async () => { 
            const audioBlob = new Blob(audioChunks, { type: 'audio/webm' }); 
            const reader = new FileReader(); 
            reader.readAsDataURL(audioBlob); 
            reader.onloadend = async () => { await sendMessage(reader.result, 'voice'); }; 
            stream.getTracks().forEach(track => track.stop()); 
          }; 
          mediaRecorder.start(); 
          isRecording = true;

        } catch(err) { console.error("Microphone error:", err); }

    function openMyProfile() {
      if (!$('editProfileModal')) return;
      $('editNickname').value = currentUser?.nickname || "";
      $('editUsername').value = currentUser?.username || "";
      $('editAvatarPreview').src = avatarUrl(currentUser);
      $('editProfileModal').style.display = "flex";
    }
    
    async function saveMyProfile() {
      if (!currentUser || !db) return;
      const newNickname = $('editNickname')?.value.trim() || "";
      const newUsername = normalizeUsername($('editUsername')?.value || "");
      const newAvatar = localStorage.getItem("pulsar_temp_avatar") || currentUser.avatar;
      if (!newNickname || !newUsername) { showError($('settingsInfo'), "Заполните поля"); return; }
      if (newUsername !== currentUser.username) {
        const snapshot = await db.ref("users").orderByChild("username_lc").equalTo(newUsername).get();
        if (snapshot.exists()) {
          const other = Object.values(snapshot.val())[0];
          if (other.uid !== currentUser.uid) { showError($('settingsInfo'), "@ уже занят"); return; }
        }
      }
      const updates = { nickname: newNickname, username: newUsername, username_lc: newUsername, avatar: newAvatar };
      await db.ref(`users/${currentUser.uid}`).update(updates);
      currentUser = { ...currentUser, ...updates };
      localStorage.removeItem("pulsar_temp_avatar");
      updateMyProfileDisplay();
      updateMobileMyProfileDisplay();
      renderChats();
      renderMobileChats();
      $('editProfileModal').style.display = "none";
      if ($('settingsInfo')) $('settingsInfo').innerText = "Профиль обновлён";
      setTimeout(() => { if ($('settingsInfo')) $('settingsInfo').innerText = ""; }, 2000);
    }
    
    if ($('deleteChatBtn')) { $('deleteChatBtn').onclick = () => { if (selectedPartner) $('deleteChatModal').style.display = "flex"; }; }
    
    if ($('deleteForMeBtn')) {
      $('deleteForMeBtn').onclick = async () => {
        if (!selectedPartner || !db) return;
        const cid = chatId(currentUser.uid, selectedPartner);
        await db.ref(`messages/${cid}`).remove();
        const index = chatsList.indexOf(selectedPartner);
        if (index !== -1) chatsList.splice(index, 1);
        if (currentMessageRef && currentMessageRef.off) {
          currentMessageRef.off();
          currentMessageRef = null;
        }
        renderChats();
        renderMobileChats();
        if ($('messages')) $('messages').innerHTML = "";
        if ($('mobileMessages')) $('mobileMessages').innerHTML = "";
        selectedPartner = null;
        if ($('chatTitle')) $('chatTitle').innerText = "Нет диалога";
        if ($('mobileChatTitle')) $('mobileChatTitle').innerText = "Нет диалога";
        if ($('deleteChatBtn')) $('deleteChatBtn').classList.add("hidden");
        $('deleteChatModal').style.display = "none";
      };
    }
    
    if ($('deleteForBothBtn')) {
      $('deleteForBothBtn').onclick = async () => {
        if (!selectedPartner || !db) return;
        const cid = chatId(currentUser.uid, selectedPartner);
        await db.ref(`messages/${cid}`).remove();
        const index = chatsList.indexOf(selectedPartner);
        if (index !== -1) chatsList.splice(index, 1);
        if (currentMessageRef && currentMessageRef.off) {
          currentMessageRef.off();
          currentMessageRef = null;
        }
        renderChats();
        renderMobileChats();
        if ($('messages')) $('messages').innerHTML = "";
        if ($('mobileMessages')) $('mobileMessages').innerHTML = "";
        selectedPartner = null;
        if ($('chatTitle')) $('chatTitle').innerText = "Нет диалога";
        if ($('mobileChatTitle')) $('mobileChatTitle').innerText = "Нет диалога";
        if ($('deleteChatBtn')) $('deleteChatBtn').classList.add("hidden");
        $('deleteChatModal').style.display = "none";
      };
    }
    
    if ($('cancelDeleteBtn')) { $('cancelDeleteBtn').onclick = () => { $('deleteChatModal').style.display = "none"; }; }
    
    if ($('saveSettingsBtn')) {
      $('saveSettingsBtn').onclick = async () => {
        if (!currentUser || !db) return;
        const selectedTheme = $('selectedThemeText')?.innerText === "GreenBlack" ? "greenblack" : "default";
        const updates = { hideStatus: getCheckboxValue($('hideStatusToggle')), theme: selectedTheme };
        await db.ref(`users/${currentUser.uid}`).update(updates);
        currentUser = { ...currentUser, ...updates };
        applyTheme(selectedTheme);
        applyLiquidGlass(getCheckboxValue($('liquidGlassToggle')));
        saveSnowSettings();
        reloadSnow();
        if ($('settingsInfo')) $('settingsInfo').innerText = "Сохранено";
        setTimeout(() => { if ($('settingsInfo')) $('settingsInfo').innerText = ""; }, 2000);
      };
    }
    
    if ($('logoutSettingsBtn')) {
      $('logoutSettingsBtn').onclick = () => {
        $('settingsModal').style.display = "none";
        $('confirmLogoutModal').style.display = "flex";
      };
    }
    
    if ($('confirmLogoutBtn')) {
      $('confirmLogoutBtn').onclick = async () => {
        if (currentUser?.uid && db) await db.ref(`users/${currentUser.uid}`).update({ online: false, last_seen: Date.now() });
        localStorage.removeItem("pulsar_uid");
        location.reload();
      };
    }
    
    if ($('cancelLogoutBtn')) { $('cancelLogoutBtn').onclick = () => { $('confirmLogoutModal').style.display = "none"; }; }
    
    if ($('adminTrigger')) {
      $('adminTrigger').onclick = () => { adminClicks++; if (adminClicks >= 5) { adminClicks = 0; $('adminModal').style.display = "flex"; } };
    }
    
    if ($('grantNftBtn')) {
      $('grantNftBtn').onclick = async () => {
        const uname = normalizeUsername($('adminUsername')?.value || "");
        const nftName = normalizeUsername($('nftUsernameInput')?.value || "");
        if (!nftName) { if ($('adminInfo')) $('adminInfo').innerText = "Введите NFT @username"; return; }
        const snapshot = await db.ref("users").orderByChild("username_lc").equalTo(uname).get();
        if (!snapshot.exists()) { if ($('adminInfo')) $('adminInfo').innerText = "Пользователь не найден"; return; }
        const uid = Object.keys(snapshot.val())[0];
        await db.ref(`users/${uid}`).update({ nftUsername: nftName });
        if ($('adminInfo')) $('adminInfo').innerText = `Выдан NFT: ${nftName}`;
      };
    }
    
    if ($('setManualAnonBtn')) {
      $('setManualAnonBtn').onclick = async () => {
        const uname = normalizeUsername($('adminUsername')?.value || "");
        const num = $('manualAnonNumber')?.value.trim() || "";
        if (!num.startsWith("+888")) { if ($('adminInfo')) $('adminInfo').innerText = "Номер должен начинаться с +888"; return; }
        const snapshot = await db.ref("users").orderByChild("username_lc").equalTo(uname).get();
        if (!snapshot.exists()) { if ($('adminInfo')) $('adminInfo').innerText = "Пользователь не найден"; return; }
        const uid = Object.keys(snapshot.val())[0];
        await db.ref(`users/${uid}`).update({ anonNumber: num });
        if ($('adminInfo')) $('adminInfo').innerText = `Номер: ${num}`;
      };
    }
    
    if ($('closeAdmin')) { $('closeAdmin').onclick = () => { $('adminModal').style.display = "none"; }; }
    
    if ($('loginTab')) {
      $('loginTab').onclick = () => {
        $('loginForm').classList.remove("hidden");
        $('registerForm').classList.add("hidden");
        $('loginTab').classList.add("bg-white/5");
        $('registerTab').classList.remove("bg-white/5");
      };
    }
    
    if ($('registerTab')) {
      $('registerTab').onclick = () => {
        $('registerForm').classList.remove("hidden");
        $('loginForm').classList.add("hidden");
        $('registerTab').classList.add("bg-white/5");
        $('loginTab').classList.remove("bg-white/5");
      };
    }
    
    if ($('openSettings')) {
      $('openSettings').onclick = () => {
        const savedTheme = localStorage.getItem("pulsar_theme") || currentUser?.theme || "default";
        if ($('selectedThemeText')) $('selectedThemeText').textContent = savedTheme === "default" ? "Default" : "GreenBlack";
        if ($('liquidGlassToggle')) {
          const liquidState = localStorage.getItem("pulsar_liquid") === "1";
          if(liquidState) $('liquidGlassToggle').classList.add('checked'); else $('liquidGlassToggle').classList.remove('checked');
        }
        if ($('hideStatusToggle')) {
          if(currentUser?.hideStatus) $('hideStatusToggle').classList.add('checked'); else $('hideStatusToggle').classList.remove('checked');
        }
        loadSnowSettings();
        $('settingsModal').style.display = "flex";
      };
    }
    
    if ($('closeSettings')) { 
      $('closeSettings').onclick = () => {
        $('settingsModal').style.display = "none";
      };
    }
    
    if ($('closeProfile')) { 
      $('closeProfile').onclick = () => { $('profileModal').style.display = "none"; };
    }
    
    if ($('closeEditProfile')) { 
      $('closeEditProfile').onclick = () => { $('editProfileModal').style.display = "none"; };
    }
    
    if ($('saveProfileBtn')) $('saveProfileBtn').onclick = saveMyProfile;
    if ($('myProfileBtn')) $('myProfileBtn').onclick = openMyProfile;
    
    if ($('snowToggle')) $('snowToggle').addEventListener('click', () => { saveSnowSettings(); reloadSnow(); });
    if ($('snowCount')) $('snowCount').oninput = () => { if ($('snowCountVal')) $('snowCountVal').innerText = $('snowCount').value; saveSnowSettings(); reloadSnow(); };
    if ($('snowSize')) $('snowSize').oninput = () => { if ($('snowSizeVal')) $('snowSizeVal').innerText = $('snowSize').value; saveSnowSettings(); reloadSnow(); };
    if ($('snowSpeed')) $('snowSpeed').oninput = () => { if ($('snowSpeedVal')) $('snowSpeedVal').innerText = $('snowSpeed').value; saveSnowSettings(); reloadSnow(); };
    
    function initCustomSelect() {
      const trigger = $('themeSelectTrigger');
      const dropdown = $('themeSelectDropdown');
      if (!trigger || !dropdown) return;
      trigger.addEventListener('click', () => {
        dropdown.classList.toggle('open');
      });
      document.querySelectorAll('.select-option').forEach(opt => {
        opt.addEventListener('click', () => {
          const value = opt.getAttribute('data-value');
          const text = opt.textContent;
          if ($('selectedThemeText')) $('selectedThemeText').textContent = text;
          dropdown.classList.remove('open');
          applyTheme(value);
        });
      });
      document.addEventListener('click', (e) => {
        if (!trigger.contains(e.target) && !dropdown.contains(e.target)) {
          dropdown.classList.remove('open');
        }
      });
    }
    
    function initCustomCheckbox(container, initialValue) {
      if (!container) return;
      if (initialValue) container.classList.add('checked');
      container.addEventListener('click', (e) => {
        e.stopPropagation();
        container.classList.toggle('checked');
      });
    }
    
    function initMobileNav() {
      const navChats = $('#navChatsBtn');
      const navProfile = $('#navProfileBtn');
      const navSettings = $('#navSettingsBtn');
      
      if (navChats) {
        navChats.onclick = () => {
          [navChats, navProfile, navSettings].forEach(btn => btn?.classList.remove('active'));
          navChats.classList.add('active');
          if ($('mobileChatsView')) $('mobileChatsView').style.display = 'flex';
          if ($('mobileMessagesView')) $('mobileMessagesView').style.display = 'none';
        };
      }
      if (navProfile) {
        navProfile.onclick = () => {
          [navChats, navProfile, navSettings].forEach(btn => btn?.classList.remove('active'));
          navProfile.classList.add('active');
          openMyProfile();
        };
      }
      if (navSettings) {
        navSettings.onclick = () => {
          [navChats, navProfile, navSettings].forEach(btn => btn?.classList.remove('active'));
          navSettings.classList.add('active');
          if ($('openSettings')) $('openSettings').click();
        };
      }
    }
    
    function checkMobileView() {
      const isMobile = window.innerWidth <= 768;
      const desktopSidebar = document.querySelector('.desktop-sidebar');
      const mobileView = document.querySelector('.mobile-view');
      const mobileNav = document.querySelector('.mobile-nav');
      
      if (isMobile) {
        if (desktopSidebar) desktopSidebar.style.display = 'none';
        if (mobileView) mobileView.style.display = 'flex';
        if (mobileNav) mobileNav.style.display = 'flex';
      } else {
        if (desktopSidebar) desktopSidebar.style.display = 'flex';
        if (mobileView) mobileView.style.display = 'none';
        if (mobileNav) mobileNav.style.display = 'none';
      }
    }
    
    window.addEventListener('resize', checkMobileView);
    
    initCustomSelect();
    initCustomCheckbox($('liquidGlassToggle'), localStorage.getItem("pulsar_liquid") === "1");
    initCustomCheckbox($('hideStatusToggle'), false);
    initCustomCheckbox($('snowToggle'), false);
    
    (async function autoLogin() {
      if ($('loginForm')) $('loginForm').onsubmit = loginUser;
      if ($('registerForm')) $('registerForm').onsubmit = registerUser;
      const uid = localStorage.getItem("pulsar_uid");
      if (uid && db) {
        const snap = await db.ref(`users/${uid}`).get();
        if (snap.exists()) {
          currentUser = snap.val();
          await enterApp();
        }
      }
    })();
  </script>
</body>
</html>
