<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Pulsar Messenger</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style>
    :root {
      --bg-main: #09070f;
      --bg-soft: #141022;
      --glass: rgba(24, 14, 44, 0.42);
      --text-main: #f4efff;
      --text-muted: #b8a9d7;
      --accent: #9a6bff;
      --border-glow: rgba(255, 255, 255, 0.1);
    }
    [data-theme="aurora"] { --bg-main: #09070f; --bg-soft: #171127; --glass: rgba(179, 140, 255, 0.13); --text-main: #f4efff; --text-muted: #bba9df; --accent: #9a6bff; }
    [data-theme="dusk"] { --bg-main: #07060d; --bg-soft: #120f1e; --glass: rgba(172, 125, 255, 0.11); --text-main: #f8efff; --text-muted: #c8b5e8; --accent: #b07cff; }
    [data-theme="ember"] { --bg-main: #050409; --bg-soft: #110d19; --glass: rgba(164, 116, 255, 0.12); --text-main: #f5ebff; --text-muted: #c3aedf; --accent: #8552ff; }
    
    body {
      background: radial-gradient(circle at 14% 9%, rgba(156, 106, 255, 0.24) 0%, transparent 40%),
                  radial-gradient(circle at 88% 8%, rgba(114, 74, 214, 0.28) 0%, transparent 40%),
                  linear-gradient(145deg, #040307 0%, #090711 48%, #130a22 100%);
      color: var(--text-main);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      transition: background 0.2s ease;
    }
    
    body.liquid-glass .glass,
    body.liquid-glass .glass-auth,
    body.liquid-glass .sidebar-dark,
    body.liquid-glass main.glass {
      backdrop-filter: blur(24px) !important;
      background: rgba(255, 255, 255, 0.08) !important;
      border: 1px solid rgba(255, 255, 255, 0.25) !important;
    }
    
    .glass {
      background: var(--glass);
      backdrop-filter: blur(18px);
      border: 1px solid var(--border-glow);
    }
    .glass-auth {
      background: linear-gradient(140deg, rgba(44, 28, 76, 0.68), rgba(18, 12, 34, 0.5));
      backdrop-filter: blur(26px);
      border: 1px solid rgba(199, 167, 255, 0.24);
      border-radius: 1.5rem;
    }
    .sidebar-dark {
      background: radial-gradient(circle at 11% 8%, rgba(151, 105, 255, 0.16) 0%, transparent 36%),
                  radial-gradient(circle at 89% 7%, rgba(111, 72, 215, 0.22) 0%, transparent 38%),
                  linear-gradient(160deg, rgba(7, 6, 11, 0.95), rgba(22, 14, 39, 0.92));
      border-color: rgba(255, 255, 255, 0.12);
      border-radius: 1.5rem;
    }
    .scrollbar-thin::-webkit-scrollbar { width: 6px; }
    .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
    .scrollbar-thin::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.2); border-radius: 10px; }
    .pulse-dot { animation: pulse-dot 2.2s infinite; }
    @keyframes pulse-dot { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.25); opacity: 0.5; } }
    
    /* Плавные анимации */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes messageAppear {
      from { opacity: 0; transform: scale(0.95) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .message-enter {
      animation: messageAppear 0.25s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
    }
    .slide-in {
      animation: slideIn 0.2s ease-out;
    }
    .fade-in {
      animation: fadeIn 0.15s ease-out;
    }
    
    .btn-primary {
      background: var(--accent);
      color: #09101f;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .btn-primary:hover { opacity: 0.85; }
    .btn-primary:active { transform: scale(0.98); }
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.2); }
    
    /* Снегопад */
    .snow-flake {
      position: fixed;
      pointer-events: none;
      background: white;
      border-radius: 50%;
      opacity: 0.7;
      z-index: 9999;
    }
    
    .cursor-pointer { cursor: pointer; }
    .transition-all { transition: all 0.15s ease; }
    .hidden { display: none; }
    
    /* Стиль чата */
    .chat-item-active {
      background: rgba(255,255,255,0.15);
    }
    .chat-item {
      transition: background 0.15s ease;
    }
  </style>
</head>
<body data-theme="aurora">
  <div id="snowContainer" style="position: fixed; top:0; left:0; width:100%; height:100%; pointer-events: none; z-index: 9999; overflow: hidden;"></div>

  <!-- Экран авторизации -->
  <div id="authView" class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-5xl grid md:grid-cols-2 gap-4 md:gap-6">
      <section class="glass glass-auth rounded-3xl p-8 flex flex-col justify-between min-h-[540px] relative overflow-hidden">
        <div class="absolute -top-28 -right-20 w-72 h-72 rounded-full opacity-35 blur-3xl" style="background: var(--accent); animation: spin 20s linear infinite;"></div>
        <div class="relative z-10">
          <h1 class="text-4xl md:text-5xl font-semibold tracking-tight">Pulsar</h1>
          <p class="mt-4 text-[color:var(--text-muted)] text-lg">Мессенджер с реальной синхронизацией</p>
        </div>
      </section>
      <section class="glass glass-auth rounded-3xl p-6 md:p-8 min-h-[540px]">
        <div class="flex gap-2 mb-6">
          <button id="loginTab" class="px-4 py-2 rounded-full bg-white/15 cursor-pointer transition-all">Вход</button>
          <button id="registerTab" class="px-4 py-2 rounded-full cursor-pointer transition-all">Регистрация</button>
        </div>
        <form id="loginForm" class="space-y-4">
          <input id="loginUsername" class="w-full rounded-xl bg-black/30 border border-white/15 px-4 py-3 outline-none focus:border-[color:var(--accent)] transition-all" placeholder="@username" />
          <input id="loginPassword" type="password" class="w-full rounded-xl bg-black/30 border border-white/15 px-4 py-3 outline-none" placeholder="Пароль" />
          <button type="submit" class="btn-primary w-full py-3 rounded-xl">Войти</button>
        </form>
        <form id="registerForm" class="space-y-4 hidden">
          <input id="regUsername" class="w-full rounded-xl bg-black/30 border border-white/15 px-4 py-3 outline-none" placeholder="@username" />
          <input id="regNickname" class="w-full rounded-xl bg-black/30 border border-white/15 px-4 py-3 outline-none" placeholder="Nickname" />
          <input id="regPassword" type="password" class="w-full rounded-xl bg-black/30 border border-white/15 px-4 py-3 outline-none" placeholder="Пароль" />
          <button type="submit" class="btn-primary w-full py-3 rounded-xl">Создать аккаунт</button>
        </form>
        <div class="mt-4 flex gap-2">
          <button id="openFirebaseSetup" class="text-sm text-[color:var(--text-muted)] hover:text-white underline cursor-pointer">Настройка Firebase</button>
          <button id="diagnosticBtn" class="text-sm text-[color:var(--text-muted)] hover:text-white underline cursor-pointer">Диагностика</button>
        </div>
        <p id="authError" class="mt-4 text-sm text-red-300"></p>
      </section>
    </div>
  </div>

  <!-- Модалка Firebase -->
  <div id="firebaseSetupModal" class="hidden fixed inset-0 bg-black/45 backdrop-blur-sm items-center justify-center p-4 z-50" style="display: none;">
    <div class="glass glass-auth rounded-3xl w-full max-w-2xl p-6">
      <h3 class="text-2xl font-semibold mb-2">Firebase Setup</h3>
      <textarea id="firebaseConfigInput" class="w-full h-44 rounded-xl bg-black/30 border border-white/15 p-3 text-sm font-mono" placeholder='{"apiKey":"...","authDomain":"...","databaseURL":"...","projectId":"...","storageBucket":"...","messagingSenderId":"...","appId":"..."}'></textarea>
      <div class="flex gap-2 mt-3">
        <button id="saveFirebaseConfig" class="btn-primary py-2 px-4 rounded-xl">Сохранить</button>
        <button id="closeFirebaseSetup" class="btn-secondary py-2 px-4 rounded-xl">Закрыть</button>
      </div>
      <p id="firebaseSetupInfo" class="mt-2 text-sm"></p>
    </div>
  </div>

  <!-- Модалка просмотра профиля (как в Telegram) -->
  <div id="profileModal" class="hidden fixed inset-0 bg-black/45 backdrop-blur-sm items-center justify-center p-4 z-40" style="display: none;">
    <div class="glass rounded-3xl w-full max-w-md p-6 fade-in">
      <div class="text-center">
        <img id="profileAvatar" class="w-24 h-24 rounded-full mx-auto object-cover border-3 border-[color:var(--accent)]" src="" />
        <h3 id="profileNick" class="text-xl font-bold mt-3"></h3>
        <p id="profileUsername" class="text-[color:var(--text-muted)] text-sm mt-1"></p>
        <div id="profileNftBlock" class="mt-3 p-3 rounded-xl bg-white/5 hidden">
          <p class="text-xs text-[color:var(--text-muted)]">А также</p>
          <p id="profileNft" class="text-[color:var(--accent)] font-mono"></p>
        </div>
        <div id="profileAnonBlock" class="mt-2 p-3 rounded-xl bg-white/5 hidden">
          <p class="text-xs text-[color:var(--text-muted)]">Анонимный номер</p>
          <p id="profileAnon" class="font-mono"></p>
        </div>
      </div>
      <button id="closeProfile" class="mt-5 w-full py-2 rounded-xl btn-secondary">Закрыть</button>
    </div>
  </div>

  <!-- Модалка редактирования профиля -->
  <div id="editProfileModal" class="hidden fixed inset-0 bg-black/45 backdrop-blur-sm items-center justify-center p-4 z-40" style="display: none;">
    <div class="glass rounded-3xl w-full max-w-md p-6 fade-in">
      <h3 class="text-xl font-semibold mb-4 text-center">Редактировать профиль</h3>
      <div class="text-center mb-4">
        <img id="editAvatarPreview" class="w-20 h-20 rounded-full mx-auto object-cover border-2 border-[color:var(--accent)]" src="" />
        <input type="file" id="avatarFile" accept="image/*" class="mt-2 text-sm" />
      </div>
      <input id="editNickname" class="w-full rounded-xl bg-black/30 border border-white/15 px-3 py-2 mb-3 outline-none focus:border-[color:var(--accent)]" placeholder="Nickname" />
      <input id="editUsername" class="w-full rounded-xl bg-black/30 border border-white/15 px-3 py-2 mb-3 outline-none focus:border-[color:var(--accent)]" placeholder="@username" />
      <button id="saveProfileBtn" class="btn-primary w-full py-2 rounded-xl">Сохранить</button>
      <button id="closeEditProfile" class="btn-secondary w-full py-2 rounded-xl mt-2">Отмена</button>
    </div>
  </div>

  <!-- Модалка удаления чата -->
  <div id="deleteChatModal" class="hidden fixed inset-0 bg-black/45 backdrop-blur-sm items-center justify-center p-4 z-45" style="display: none;">
    <div class="glass rounded-3xl w-full max-w-sm p-6 fade-in">
      <h3 class="text-xl font-semibold mb-3 text-center">Удалить чат</h3>
      <p class="text-center text-sm mb-4">Выберите действие:</p>
      <button id="deleteForMeBtn" class="btn-secondary w-full py-2 rounded-xl mb-2">🗑️ Удалить только у меня</button>
      <button id="deleteForBothBtn" class="btn-secondary w-full py-2 rounded-xl mb-2">⚠️ Удалить у всех (необратимо)</button>
      <button id="cancelDeleteBtn" class="btn-primary w-full py-2 rounded-xl mt-2">Отмена</button>
      <p id="deleteInfo" class="text-xs text-center mt-3 text-[color:var(--text-muted)]"></p>
    </div>
  </div>

  <!-- Главное приложение -->
  <div id="appView" class="hidden h-screen p-3 md:p-4">
    <div class="h-full grid md:grid-cols-[340px_1fr] gap-3 md:gap-4">
      <aside class="glass sidebar-dark rounded-3xl p-4 flex flex-col min-h-0">
        <div class="flex items-center justify-between mb-4">
          <div class="flex items-center gap-3 cursor-pointer" id="myProfileBtn">
            <img id="myAvatar" class="w-10 h-10 rounded-full object-cover border border-[color:var(--accent)]" src="" />
            <div>
              <h2 class="text-2xl font-semibold">Pulsar</h2>
              <p id="myUsernameLabel" class="text-sm text-[color:var(--text-muted)]"></p>
            </div>
          </div>
          <div class="flex gap-2">
            <button id="openSettings" class="btn-secondary px-3 py-1.5 rounded-lg text-xl">⚙️</button>
          </div>
        </div>
        <label class="block mb-3"><span class="text-xs text-[color:var(--text-muted)]">Поиск @username</span><div class="flex gap-2 mt-1"><input id="searchInput" class="flex-1 rounded-xl bg-black/25 border border-white/15 px-3 py-2 outline-none focus:border-[color:var(--accent)]" placeholder="@username" /><button id="searchBtn" class="btn-secondary px-3 py-2 rounded-xl">🔍</button></div></label>
        <div id="searchResult" class="text-sm mb-3"></div>
        <p class="text-xs uppercase mb-2 text-[color:var(--text-muted)]">Чаты</p>
        <div id="chatList" class="flex-1 overflow-y-auto space-y-1.5 pr-1 scrollbar-thin"></div>
        <button id="logoutBtn" class="mt-3 py-2 rounded-xl btn-secondary">Выйти</button>
      </aside>
      <main class="glass rounded-3xl flex flex-col min-h-0">
        <div class="px-5 py-3 border-b border-white/10 flex items-center justify-between">
          <div>
            <h3 id="chatTitle" class="font-semibold">Нет диалога</h3>
            <p id="chatStatus" class="text-xs text-[color:var(--text-muted)]"></p>
          </div>
          <div class="flex gap-2">
            <button id="deleteChatBtn" class="btn-secondary px-3 py-1.5 rounded-lg text-sm hidden">🗑️</button>
          </div>
        </div>
        <div id="messages" class="flex-1 overflow-y-auto p-4 space-y-3 scrollbar-thin"></div>
        <form id="messageForm" class="p-3 border-t border-white/10 flex gap-2">
          <input id="messageInput" class="flex-1 rounded-xl bg-black/25 border border-white/15 px-4 py-2 outline-none focus:border-[color:var(--accent)]" placeholder="Сообщение..." />
          <button class="btn-primary px-5 rounded-xl">➤</button>
        </form>
      </main>
    </div>
  </div>

  <!-- Настройки -->
  <div id="settingsModal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm items-center justify-center p-4 z-30" style="display: none;">
    <div class="glass rounded-3xl w-full max-w-xl p-6 max-h-[90vh] overflow-y-auto fade-in">
      <div class="flex justify-between mb-4"><h3 class="text-2xl font-semibold">Настройки</h3><button id="closeSettings" class="btn-secondary px-3 py-1 rounded-lg">✕</button></div>
      <div class="space-y-4">
        <label class="block"><span class="text-sm">Тема</span>
          <select id="themeSelect" class="mt-1 w-full rounded-xl bg-black/25 border border-white/15 px-3 py-2 outline-none">
            <option value="aurora">🌌 Aurora</option>
            <option value="dusk">🌆 Dusk</option>
            <option value="ember">🔥 Ember</option>
          </select>
        </label>
        <label class="flex items-center gap-2 cursor-pointer"><input id="liquidGlassToggle" type="checkbox" /> Liquid Glass (эффект стекла)</label>
        <label class="flex items-center gap-2 cursor-pointer"><input id="hideStatusInput" type="checkbox" /> Скрыть мой статус</label>
        <hr class="border-white/20" />
        <div><label class="text-sm font-semibold">❄️ Снегопад</label>
          <label class="flex items-center gap-2 mt-1 cursor-pointer"><input id="snowEnabled" type="checkbox" /> Включить снегопад</label>
          <label class="block mt-2">Количество: <input id="snowCount" type="range" min="0" max="150" value="40" class="w-full" /><span id="snowCountVal">40</span></label>
          <label class="block mt-1">Размер: <input id="snowSize" type="range" min="2" max="10" step="1" value="4" class="w-full" /><span id="snowSizeVal">4</span>px</label>
          <label class="block mt-1">Скорость: <input id="snowSpeed" type="range" min="3" max="12" step="1" value="6" class="w-full" /><span id="snowSpeedVal">6</span> сек</label>
        </div>
        <button id="saveSettingsBtn" class="btn-primary w-full py-3 rounded-xl">Сохранить</button>
        <p id="settingsInfo" class="text-sm"></p>
        <div class="text-center pt-2 border-t border-white/10"><button id="adminTrigger" class="text-sm text-[color:var(--text-muted)] cursor-pointer">*</button></div>
      </div>
    </div>
  </div>

  <!-- Админ панель -->
  <div id="adminModal" class="hidden fixed inset-0 bg-black/40 backdrop-blur-sm items-center justify-center p-4 z-40" style="display: none;">
    <div class="glass rounded-3xl w-full max-w-md p-6 fade-in">
      <h3 class="text-xl font-semibold mb-3">Админ-панель</h3>
      <input id="adminUsername" class="w-full rounded-xl bg-black/25 border border-white/15 px-3 py-2 mb-3 outline-none" placeholder="@username" />
      <div class="space-y-2">
        <label class="block"><span class="text-sm">NFT Username (новый @)</span>
          <input id="nftUsernameInput" class="w-full rounded-xl bg-black/25 border border-white/15 px-3 py-2 outline-none" placeholder="@nftnick" />
        </label>
        <button id="grantNftBtn" class="btn-secondary w-full py-2 rounded-xl">Выдать NFT @</button>
        <label class="block"><span class="text-sm">Анонимный номер</span>
          <input id="manualAnonNumber" class="w-full rounded-xl bg-black/25 border border-white/15 px-3 py-2 outline-none" placeholder="+888123456" />
        </label>
        <button id="setManualAnonBtn" class="btn-secondary w-full py-2 rounded-xl">Установить номер</button>
      </div>
      <button id="closeAdmin" class="mt-3 w-full py-2 rounded-xl btn-secondary">Закрыть</button>
      <p id="adminInfo" class="text-sm mt-2"></p>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-database-compat.js"></script>
  
  <script>
    // Конфиг Firebase
    const firebaseConfig = {
      apiKey: "AIzaSyCFSUOzWtlK4ldRTSEjPRdWjiL_8s-YQf4",
      authDomain: "pulsarmess.firebaseapp.com",
      databaseURL: "https://pulsarmess-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "pulsarmess",
      storageBucket: "pulsarmess.firebasestorage.app",
      messagingSenderId: "183642047359",
      appId: "1:183642047359:web:902ead1993e23e719f504a"
    };
    
    let app = null, db = null;
    try {
      if (typeof firebase !== 'undefined') {
        app = firebase.initializeApp(firebaseConfig);
        db = firebase.database();
        console.log("Firebase OK");
      }
    } catch(e) { console.error(e); }
    
    // Глобальные переменные
    let currentUser = null;
    let usersCache = {};
    let chatsList = []; // список чатов (uid собеседников)
    let selectedPartner = null;
    let messageUnsub = null;
    let adminClicks = 0;
    let snowInterval = null;
    let snowActive = false;
    
    // DOM элементы
    const els = {};
    const ids = ['authView','appView','loginTab','registerTab','loginForm','registerForm','authError',
      'loginUsername','loginPassword','regUsername','regNickname','regPassword','myUsernameLabel','myAvatar',
      'searchInput','searchBtn','searchResult','chatList','logoutBtn','chatTitle','chatStatus',
      'messages','messageForm','messageInput','openSettings','closeSettings','settingsModal',
      'hideStatusInput','themeSelect','saveSettingsBtn','settingsInfo','deleteChatBtn',
      'adminTrigger','adminModal','closeAdmin','adminUsername','grantNftBtn','adminInfo',
      'manualAnonNumber','setManualAnonBtn','avatarFile','liquidGlassToggle',
      'snowEnabled','snowCount','snowSize','snowSpeed','snowCountVal','snowSizeVal','snowSpeedVal',
      'openFirebaseSetup','firebaseSetupModal','closeFirebaseSetup','firebaseConfigInput',
      'saveFirebaseConfig','firebaseSetupInfo','diagnosticBtn',
      'profileModal','closeProfile','profileAvatar','profileNick','profileUsername','profileNft','profileAnon','profileNftBlock','profileAnonBlock',
      'editProfileModal','closeEditProfile','editAvatarPreview','editNickname','editUsername','saveProfileBtn',
      'myProfileBtn','nftUsernameInput',
      'deleteChatModal','deleteForMeBtn','deleteForBothBtn','cancelDeleteBtn','deleteInfo'];
    
    ids.forEach(id => { els[id] = document.getElementById(id); });
    
    // HELPER FUNCTIONS
    function normalizeUsername(raw) {
      let s = String(raw || "").trim();
      if (!s) return "";
      if (!s.startsWith("@")) s = "@" + s;
      return s.toLowerCase();
    }
    
    function displayUserIdentifier(u) {
      if (u?.nftUsername && u.nftUsername.trim()) return u.nftUsername;
      return u?.username || "@unknown";
    }
    
    function getDisplayName(u) {
      let name = u?.nickname || "User";
      if (u?.nftUsername) name += " ✨";
      return name;
    }
    
    function avatarUrl(u) { 
      return u?.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(u?.nickname || "U")}&background=6d28d9&color=fff&bold=true&size=128`; 
    }
    
    function chatId(a,b) { return [a,b].sort().join("__"); }
    function showError(el, msg) { if(el) { el.innerHTML = msg; setTimeout(() => { if(el.innerHTML === msg) el.innerHTML = ""; }, 4000); } }
    function escapeHtml(str) { if (!str) return ""; return String(str).replace(/[&<>]/g, function(m) { if (m === '&') return '&amp;'; if (m === '<') return '&lt;'; if (m === '>') return '&gt;'; return m; }); }
    
    // Темы
    function applyTheme(theme) {
      document.body.setAttribute("data-theme", theme || "aurora");
      localStorage.setItem("pulsar_theme", theme || "aurora");
    }
    
    function applyLiquidGlass(enabled) {
      if (enabled) document.body.classList.add("liquid-glass");
      else document.body.classList.remove("liquid-glass");
      localStorage.setItem("pulsar_liquid", enabled ? "1" : "0");
    }
    
    // Снегопад (постоянный)
    function startSnow(count, size, speedSec) {
      const container = document.getElementById("snowContainer");
      if (!container) return;
      if (snowInterval) clearInterval(snowInterval);
      snowActive = true;
      
      function createFlake() {
        if (!snowActive || !els.snowEnabled?.checked) return;
        const flake = document.createElement("div");
        flake.classList.add("snow-flake");
        const sz = size + Math.random() * 4;
        flake.style.width = sz + "px";
        flake.style.height = sz + "px";
        flake.style.left = Math.random() * 100 + "%";
        const duration = speedSec + Math.random() * 5;
        flake.style.animation = `fall ${duration}s linear forwards`;
        container.appendChild(flake);
        setTimeout(() => { if (flake.parentNode) flake.remove(); }, duration * 1000);
      }
      
      const style = document.createElement('style');
      style.textContent = `@keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 0.7; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }`;
      document.head.appendChild(style);
      
      const intervalTime = Math.max(100, Math.min(500, 3000 / Math.max(count, 1)));
      snowInterval = setInterval(createFlake, intervalTime);
    }
    
    function stopSnow() { 
      snowActive = false;
      if (snowInterval) { clearInterval(snowInterval); snowInterval = null; }
      const c = document.getElementById("snowContainer"); 
      if (c) c.innerHTML = ""; 
    }
    
    function reloadSnow() {
      if (els.snowEnabled?.checked) {
        stopSnow();
        startSnow(parseInt(els.snowCount?.value || 40), parseInt(els.snowSize?.value || 4), parseInt(els.snowSpeed?.value || 6));
      } else {
        stopSnow();
      }
    }
    
    // Аватар
    if (els.avatarFile) {
      els.avatarFile.addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (file && file.type.startsWith("image/")) {
          const reader = new FileReader();
          reader.onload = (ev) => {
            const b64 = ev.target.result;
            if (els.editAvatarPreview) els.editAvatarPreview.src = b64;
            localStorage.setItem("pulsar_temp_avatar", b64);
          };
          reader.readAsDataURL(file);
        }
      });
    }
    
    // Регистрация
    async function registerUser(e) {
      e.preventDefault();
      if (!db) { showError(els.authError, "❌ Firebase не подключён"); return; }
      const username = normalizeUsername(els.regUsername?.value || "");
      const nickname = els.regNickname?.value?.trim() || "";
      const password = els.regPassword?.value || "";
      if (!username || !nickname || !password) { showError(els.authError, "Заполните все поля"); return; }
      try {
        const snapshot = await db.ref("users").orderByChild("username_lc").equalTo(username).get();
        if (snapshot.exists()) { showError(els.authError, "@ уже занят"); return; }
        const uid = db.ref("users").push().key;
        const user = { 
          uid, username, username_lc: username, nickname, password, 
          avatar: "", hideStatus: false, nftUsername: "", anonNumber: "", 
          online: true, last_seen: Date.now(), created_at: Date.now() 
        };
        await db.ref(`users/${uid}`).set(user);
        localStorage.setItem("pulsar_uid", uid);
        currentUser = user;
        await enterApp();
      } catch(err) { showError(els.authError, err.message); }
    }
    
    // Вход
    async function loginUser(e) {
      e.preventDefault();
      if (!db) { showError(els.authError, "❌ Firebase не подключён"); return; }
      const uname = normalizeUsername(els.loginUsername?.value || "");
      const pass = els.loginPassword?.value || "";
      try {
        const snapshot = await db.ref("users").orderByChild("username_lc").equalTo(uname).get();
        if (!snapshot.exists()) { showError(els.authError, "Пользователь не найден"); return; }
        const user = Object.values(snapshot.val())[0];
        if (user.password !== pass) { showError(els.authError, "Неверный пароль"); return; }
        localStorage.setItem("pulsar_uid", user.uid);
        currentUser = user;
        await db.ref(`users/${user.uid}`).update({ online: true, last_seen: Date.now() });
        await enterApp();
      } catch(err) { showError(els.authError, err.message); }
    }
    
    // Основное приложение
    async function enterApp() {
      if (!els.authView || !els.appView) return;
      els.authView.classList.add("hidden");
      els.appView.classList.remove("hidden");
      updateMyProfileDisplay();
      
      const savedTheme = localStorage.getItem("pulsar_theme") || currentUser?.theme || "aurora";
      applyTheme(savedTheme);
      const liquidState = localStorage.getItem("pulsar_liquid") === "1";
      applyLiquidGlass(liquidState);
      if (els.liquidGlassToggle) els.liquidGlassToggle.checked = liquidState;
      if (els.themeSelect) els.themeSelect.value = savedTheme;
      
      // Подписка на пользователей
      db.ref("users").on("value", (snap) => {
        usersCache = snap.val() || {};
        updateChatsList();
        renderChats();
        if (selectedPartner && usersCache[selectedPartner]) {
          renderChatHeader(selectedPartner);
        }
        updateMyProfileDisplay();
      });
      
      // Обновление статуса
      setInterval(() => {
        if (currentUser?.uid && db) db.ref(`users/${currentUser.uid}`).update({ last_seen: Date.now() });
      }, 30000);
      
      updateChatsList();
      renderChats();
      
      if (els.snowEnabled) {
        const savedSnow = localStorage.getItem("pulsar_snow") === "1";
        els.snowEnabled.checked = savedSnow;
        if (savedSnow) reloadSnow();
      }
    }
    
    function updateMyProfileDisplay() {
      if (currentUser && els.myUsernameLabel) {
        els.myUsernameLabel.innerText = displayUserIdentifier(currentUser);
        if (els.myAvatar) els.myAvatar.src = avatarUrl(currentUser);
      }
    }
    
    // Обновление списка чатов из сообщений
    async function updateChatsList() {
      if (!db || !currentUser) return;
      const snapshot = await db.ref("messages").get();
      const allMessages = snapshot.val() || {};
      const chatSet = new Set();
      
      for (const chatIdKey in allMessages) {
        const messages = allMessages[chatIdKey];
        for (const msgId in messages) {
          const msg = messages[msgId];
          if (msg.senderUid === currentUser.uid) {
            chatSet.add(msg.receiverUid);
          }
          if (msg.receiverUid === currentUser.uid) {
            chatSet.add(msg.senderUid);
          }
        }
      }
      chatsList = Array.from(chatSet);
    }
    
    function renderChats() {
      if (!els.chatList) return;
      const list = chatsList.filter(uid => uid !== currentUser?.uid && usersCache[uid]);
      
      if (list.length === 0) {
        els.chatList.innerHTML = '<p class="text-sm text-[color:var(--text-muted)] text-center py-4">Нет чатов.<br>Найдите пользователя через поиск</p>';
        return;
      }
      
      els.chatList.innerHTML = list.map(uid => {
        const u = usersCache[uid];
        if (!u) return '';
        const isActive = selectedPartner === uid;
        return `
          <button data-chat="${uid}" class="chat-item w-full text-left p-2 rounded-xl ${isActive ? 'chat-item-active bg-white/15' : 'hover:bg-white/5'} transition-all cursor-pointer">
            <div class="flex gap-3 items-center">
              <img src="${avatarUrl(u)}" class="w-10 h-10 rounded-full object-cover cursor-pointer" data-profile="${uid}" onerror="this.src='https://ui-avatars.com/api/?name=${u.nickname}&background=6d28d9&color=fff'" />
              <div class="flex-1">
                <b>${escapeHtml(getDisplayName(u))}</b>
                <p class="text-xs text-[color:var(--text-muted)]">${escapeHtml(displayUserIdentifier(u))}</p>
              </div>
              <div class="text-xs">${u.online ? '<span class="text-green-400">●</span>' : '<span class="text-gray-500">○</span>'}</div>
            </div>
          </button>
        `;
      }).join("");
      
      Array.from(els.chatList.querySelectorAll("[data-chat]")).forEach(btn => {
        btn.addEventListener("click", (e) => {
          if (e.target.tagName === 'IMG') {
            const uid = e.target.getAttribute('data-profile');
            if (uid) openProfile(uid);
          } else {
            openChat(btn.dataset.chat);
          }
        });
      });
    }
    
    async function openChat(uid) {
      if (messageUnsub && typeof messageUnsub === 'function') messageUnsub();
      selectedPartner = uid;
      renderChats();
      renderChatHeader(uid);
      if (els.deleteChatBtn) els.deleteChatBtn.classList.remove("hidden");
      
      const cid = chatId(currentUser.uid, uid);
      const messagesRef = db.ref(`messages/${cid}`);
      messageUnsub = messagesRef.on("value", (snap) => {
        const msgs = [];
        snap.forEach(child => { msgs.push({ id: child.key, ...child.val() }); });
        msgs.sort((a,b) => (a.timestamp||0) - (b.timestamp||0));
        
        if (els.messages) {
          // Анимированное добавление новых сообщений
          const currentMsgIds = Array.from(els.messages.children).map(el => el.getAttribute('data-msg-id'));
          const newMsgs = msgs.filter(m => !currentMsgIds.includes(m.id));
          const existingMsgs = msgs.filter(m => currentMsgIds.includes(m.id));
          
          if (existingMsgs.length === 0) {
            // Полная перерисовка
            els.messages.innerHTML = msgs.map(m => `
              <div data-msg-id="${m.id}" class="${m.senderUid === currentUser.uid ? "text-right" : "text-left"} message-enter">
                <div class="inline-block p-2 rounded-xl bg-white/10 my-1 max-w-[70%] break-words">${escapeHtml(m.text || "")}</div>
              </div>
            `).join("");
          } else {
            // Добавляем только новые сообщения с анимацией
            newMsgs.forEach(m => {
              const msgDiv = document.createElement('div');
              msgDiv.setAttribute('data-msg-id', m.id);
              msgDiv.className = m.senderUid === currentUser.uid ? "text-right message-enter" : "text-left message-enter";
              msgDiv.innerHTML = `<div class="inline-block p-2 rounded-xl bg-white/10 my-1 max-w-[70%] break-words">${escapeHtml(m.text || "")}</div>`;
              els.messages.appendChild(msgDiv);
              msgDiv.scrollIntoView({ behavior: 'smooth', block: 'end' });
            });
          }
          els.messages.scrollTop = els.messages.scrollHeight;
        }
      });
    }
    
    function renderChatHeader(uid) {
      const u = usersCache[uid];
      if (!u || !els.chatTitle) return;
      els.chatTitle.innerText = getDisplayName(u);
      if (els.chatStatus) {
        if (u.hideStatus) els.chatStatus.innerText = "статус скрыт";
        else els.chatStatus.innerText = u.online ? "🟢 онлайн" : `⚫ был(а) ${new Date(u.last_seen || Date.now()).toLocaleTimeString()}`;
      }
    }
    
    // Отправка сообщений
    if (els.messageForm) {
      els.messageForm.onsubmit = async (e) => {
        e.preventDefault();
        if (!selectedPartner || !els.messageInput?.value.trim() || !db) return;
        const cid = chatId(currentUser.uid, selectedPartner);
        await db.ref(`messages/${cid}`).push({
          senderUid: currentUser.uid,
          receiverUid: selectedPartner,
          text: els.messageInput.value.trim(),
          timestamp: Date.now()
        });
        els.messageInput.value = "";
        // Обновить список чатов
        if (!chatsList.includes(selectedPartner)) {
          chatsList.push(selectedPartner);
          renderChats();
        }
      };
    }
    
    // Поиск
    if (els.searchBtn) {
      els.searchBtn.onclick = async () => {
        const uname = normalizeUsername(els.searchInput?.value || "");
        if (!uname) { if (els.searchResult) els.searchResult.innerText = "Введите @username"; return; }
        const snapshot = await db.ref("users").orderByChild("username_lc").equalTo(uname).get();
        if (!snapshot.exists()) { if (els.searchResult) els.searchResult.innerText = "❌ не найден"; return; }
        const u = Object.values(snapshot.val())[0];
        if (u.uid === currentUser.uid) {
          if (els.searchResult) els.searchResult.innerText = "❌ Нельзя начать чат с собой";
          return;
        }
        if (els.searchResult) {
          els.searchResult.innerHTML = `<button id="foundUserBtn" class="btn-secondary p-2 rounded-xl w-full cursor-pointer transition-all">${escapeHtml(getDisplayName(u))} — ${escapeHtml(displayUserIdentifier(u))}</button>`;
          document.getElementById("foundUserBtn")?.addEventListener("click", async () => {
            if (!chatsList.includes(u.uid)) {
              chatsList.push(u.uid);
              renderChats();
            }
            openChat(u.uid);
            els.searchInput.value = "";
            els.searchResult.innerHTML = "";
          });
        }
      };
    }
    
    // Профиль (как в Telegram)
    function openProfile(uid) {
      const u = usersCache[uid];
      if (!u || !els.profileModal) return;
      if (els.profileAvatar) els.profileAvatar.src = avatarUrl(u);
      if (els.profileNick) els.profileNick.innerText = getDisplayName(u);
      if (els.profileUsername) els.profileUsername.innerText = displayUserIdentifier(u);
      
      // NFT блок
      if (u.nftUsername && u.nftUsername.trim()) {
        if (els.profileNft) els.profileNft.innerText = u.nftUsername;
        if (els.profileNftBlock) els.profileNftBlock.classList.remove("hidden");
      } else {
        if (els.profileNftBlock) els.profileNftBlock.classList.add("hidden");
      }
      
      // Анонимный номер блок
      if (u.anonNumber && u.anonNumber.trim()) {
        if (els.profileAnon) els.profileAnon.innerText = u.anonNumber;
        if (els.profileAnonBlock) els.profileAnonBlock.classList.remove("hidden");
      } else {
        if (els.profileAnonBlock) els.profileAnonBlock.classList.add("hidden");
      }
      
      els.profileModal.style.display = "flex";
    }
    
    function openMyProfile() {
      if (!els.editProfileModal) return;
      if (els.editNickname) els.editNickname.value = currentUser?.nickname || "";
      if (els.editUsername) els.editUsername.value = currentUser?.username || "";
      if (els.editAvatarPreview) els.editAvatarPreview.src = avatarUrl(currentUser);
      els.editProfileModal.style.display = "flex";
    }
    
    async function saveMyProfile() {
      if (!currentUser || !db) return;
      const newNickname = els.editNickname?.value.trim() || "";
      const newUsername = normalizeUsername(els.editUsername?.value || "");
      const newAvatar = localStorage.getItem("pulsar_temp_avatar") || currentUser.avatar;
      
      if (!newNickname || !newUsername) { showError(els.settingsInfo, "Заполните поля"); return; }
      
      if (newUsername !== currentUser.username) {
        const snapshot = await db.ref("users").orderByChild("username_lc").equalTo(newUsername).get();
        if (snapshot.exists()) {
          const other = Object.values(snapshot.val())[0];
          if (other.uid !== currentUser.uid) {
            showError(els.settingsInfo, "@ уже занят");
            return;
          }
        }
      }
      
      const updates = { nickname: newNickname, username: newUsername, username_lc: newUsername, avatar: newAvatar };
      await db.ref(`users/${currentUser.uid}`).update(updates);
      currentUser = { ...currentUser, ...updates };
      localStorage.removeItem("pulsar_temp_avatar");
      updateMyProfileDisplay();
      renderChats();
      els.editProfileModal.style.display = "none";
      if (els.settingsInfo) els.settingsInfo.innerText = "✅ Профиль обновлён";
      setTimeout(() => { if (els.settingsInfo) els.settingsInfo.innerText = ""; }, 2000);
    }
    
    // Удаление чата
    if (els.deleteChatBtn) {
      els.deleteChatBtn.onclick = () => {
        if (!selectedPartner) return;
        if (els.deleteChatModal) els.deleteChatModal.style.display = "flex";
      };
    }
    
    if (els.deleteForMeBtn) {
      els.deleteForMeBtn.onclick = async () => {
        if (!selectedPartner || !db) return;
        const cid = chatId(currentUser.uid, selectedPartner);
        // Удаляем все сообщения в этом чате
        await db.ref(`messages/${cid}`).remove();
        // Удаляем из списка чатов
        const index = chatsList.indexOf(selectedPartner);
        if (index !== -1) chatsList.splice(index, 1);
        renderChats();
        // Очищаем текущий чат
        if (els.messages) els.messages.innerHTML = "";
        selectedPartner = null;
        if (els.chatTitle) els.chatTitle.innerText = "Нет диалога";
        if (els.chatStatus) els.chatStatus.innerText = "";
        if (els.deleteChatBtn) els.deleteChatBtn.classList.add("hidden");
        if (els.deleteChatModal) els.deleteChatModal.style.display = "none";
        if (els.deleteInfo) els.deleteInfo.innerText = "✅ Чат удалён у вас";
        setTimeout(() => { if (els.deleteInfo) els.deleteInfo.innerText = ""; }, 2000);
      };
    }
    
    if (els.deleteForBothBtn) {
      els.deleteForBothBtn.onclick = async () => {
        if (!selectedPartner || !db) return;
        const cid = chatId(currentUser.uid, selectedPartner);
        await db.ref(`messages/${cid}`).remove();
        const index = chatsList.indexOf(selectedPartner);
        if (index !== -1) chatsList.splice(index, 1);
        renderChats();
        if (els.messages) els.messages.innerHTML = "";
        selectedPartner = null;
        if (els.chatTitle) els.chatTitle.innerText = "Нет диалога";
        if (els.chatStatus) els.chatStatus.innerText = "";
        if (els.deleteChatBtn) els.deleteChatBtn.classList.add("hidden");
        if (els.deleteChatModal) els.deleteChatModal.style.display = "none";
        if (els.deleteInfo) els.deleteInfo.innerText = "✅ Чат удалён у всех";
        setTimeout(() => { if (els.deleteInfo) els.deleteInfo.innerText = ""; }, 2000);
      };
    }
    
    if (els.cancelDeleteBtn) {
      els.cancelDeleteBtn.onclick = () => {
        if (els.deleteChatModal) els.deleteChatModal.style.display = "none";
      };
    }
    
    // Настройки
    if (els.saveSettingsBtn) {
      els.saveSettingsBtn.onclick = async () => {
        if (!currentUser || !db) return;
        const updates = {
          hideStatus: !!els.hideStatusInput?.checked,
          theme: els.themeSelect?.value || "aurora"
        };
        await db.ref(`users/${currentUser.uid}`).update(updates);
        currentUser = { ...currentUser, ...updates };
        applyTheme(updates.theme);
        applyLiquidGlass(!!els.liquidGlassToggle?.checked);
        localStorage.setItem("pulsar_snow", els.snowEnabled?.checked ? "1" : "0");
        reloadSnow();
        if (els.settingsInfo) els.settingsInfo.innerText = "✅ Сохранено!";
        setTimeout(() => { if (els.settingsInfo) els.settingsInfo.innerText = ""; }, 2000);
      };
    }
    
    // Админ-панель
    if (els.adminTrigger) {
      els.adminTrigger.onclick = () => {
        adminClicks++;
        if (adminClicks >= 5) {
          adminClicks = 0;
          if (els.adminModal) els.adminModal.style.display = "flex";
        }
      };
    }
    
    if (els.grantNftBtn) {
      els.grantNftBtn.onclick = async () => {
        const uname = normalizeUsername(els.adminUsername?.value || "");
        const nftName = normalizeUsername(els.nftUsernameInput?.value || "");
        if (!nftName) { if (els.adminInfo) els.adminInfo.innerText = "Введите NFT @username"; return; }
        const snapshot = await db.ref("users").orderByChild("username_lc").equalTo(uname).get();
        if (!snapshot.exists()) { if (els.adminInfo) els.adminInfo.innerText = "❌ Пользователь не найден"; return; }
        const uid = Object.keys(snapshot.val())[0];
        await db.ref(`users/${uid}`).update({ nftUsername: nftName });
        if (els.adminInfo) els.adminInfo.innerText = `✅ Выдан NFT: ${nftName}`;
      };
    }
    
    if (els.setManualAnonBtn) {
      els.setManualAnonBtn.onclick = async () => {
        const uname = normalizeUsername(els.adminUsername?.value || "");
        const num = els.manualAnonNumber?.value.trim() || "";
        if (!num.startsWith("+888")) { if (els.adminInfo) els.adminInfo.innerText = "Номер должен начинаться с +888"; return; }
        const snapshot = await db.ref("users").orderByChild("username_lc").equalTo(uname).get();
        if (!snapshot.exists()) { if (els.adminInfo) els.adminInfo.innerText = "❌ Пользователь не найден"; return; }
        const uid = Object.keys(snapshot.val())[0];
        await db.ref(`users/${uid}`).update({ anonNumber: num });
        if (els.adminInfo) els.adminInfo.innerText = `✅ Номер: ${num}`;
      };
    }
    
    // Выход
    if (els.logoutBtn) {
      els.logoutBtn.onclick = async () => {
        if (currentUser?.uid && db) await db.ref(`users/${currentUser.uid}`).update({ online: false, last_seen: Date.now() });
        localStorage.removeItem("pulsar_uid");
        location.reload();
      };
    }
    
    // Переключение вкладок
    if (els.loginTab) {
      els.loginTab.onclick = () => {
        els.loginForm.classList.remove("hidden");
        els.registerForm.classList.add("hidden");
        els.loginTab.classList.add("bg-white/15");
        els.registerTab.classList.remove("bg-white/15");
      };
    }
    if (els.registerTab) {
      els.registerTab.onclick = () => {
        els.registerForm.classList.remove("hidden");
        els.loginForm.classList.add("hidden");
        els.registerTab.classList.add("bg-white/15");
        els.loginTab.classList.remove("bg-white/15");
      };
    }
    
    // Модалки
    if (els.openSettings) {
      els.openSettings.onclick = () => {
        if (els.hideStatusInput) els.hideStatusInput.checked = currentUser?.hideStatus || false;
        if (els.themeSelect) els.themeSelect.value = currentUser?.theme || "aurora";
        if (els.liquidGlassToggle) els.liquidGlassToggle.checked = localStorage.getItem("pulsar_liquid") === "1";
        if (els.snowEnabled) els.snowEnabled.checked = localStorage.getItem("pulsar_snow") === "1";
        if (els.settingsModal) els.settingsModal.style.display = "flex";
      };
    }
    if (els.closeSettings) els.closeSettings.onclick = () => { if (els.settingsModal) els.settingsModal.style.display = "none"; };
    if (els.closeAdmin) els.closeAdmin.onclick = () => { if (els.adminModal) els.adminModal.style.display = "none"; };
    if (els.closeProfile) els.closeProfile.onclick = () => { if (els.profileModal) els.profileModal.style.display = "none"; };
    if (els.closeEditProfile) els.closeEditProfile.onclick = () => { if (els.editProfileModal) els.editProfileModal.style.display = "none"; };
    if (els.saveProfileBtn) els.saveProfileBtn.onclick = saveMyProfile;
    if (els.myProfileBtn) els.myProfileBtn.onclick = openMyProfile;
    
    // Firebase настройка
    if (els.openFirebaseSetup) {
      els.openFirebaseSetup.onclick = () => {
        if (els.firebaseConfigInput) els.firebaseConfigInput.value = JSON.stringify(firebaseConfig, null, 2);
        if (els.firebaseSetupModal) els.firebaseSetupModal.style.display = "flex";
      };
    }
    if (els.closeFirebaseSetup) els.closeFirebaseSetup.onclick = () => { if (els.firebaseSetupModal) els.firebaseSetupModal.style.display = "none"; };
    if (els.saveFirebaseConfig) {
      els.saveFirebaseConfig.onclick = () => {
        try {
          const newConfig = JSON.parse(els.firebaseConfigInput.value);
          localStorage.setItem("pulsar_fb_config", JSON.stringify(newConfig));
          if (els.firebaseSetupInfo) els.firebaseSetupInfo.innerText = "✅ Сохранено, перезагрузите страницу";
          setTimeout(() => location.reload(), 1500);
        } catch(e) {
          if (els.firebaseSetupInfo) els.firebaseSetupInfo.innerText = "❌ Неверный JSON";
        }
      };
    }
    
    // Снегопад настройки
    if (els.snowEnabled) els.snowEnabled.onchange = reloadSnow;
    if (els.snowCount) els.snowCount.oninput = () => { if (els.snowCountVal) els.snowCountVal.innerText = els.snowCount.value; reloadSnow(); };
    if (els.snowSize) els.snowSize.oninput = () => { if (els.snowSizeVal) els.snowSizeVal.innerText = els.snowSize.value; reloadSnow(); };
    if (els.snowSpeed) els.snowSpeed.oninput = () => { if (els.snowSpeedVal) els.snowSpeedVal.innerText = els.snowSpeed.value; reloadSnow(); };
    
    // Диагностика
    if (els.diagnosticBtn) {
      els.diagnosticBtn.onclick = () => {
        alert(`🔍 Диагностика Pulsar\n\n✅ Firebase: ${db ? "Подключён" : "НЕ подключён"}\n✅ Пользователь: ${currentUser ? currentUser.nickname : "не авторизован"}\n📋 Чатов: ${chatsList.length}\n🌐 Браузер: ${navigator.userAgent.split(' ').slice(-2).join(' ')}\n❄️ Снегопад: ${els.snowEnabled?.checked ? "вкл" : "выкл"}`);
      };
    }
    
    // Автовход
    (async function autoLogin() {
      if (els.loginForm) els.loginForm.onsubmit = loginUser;
      if (els.registerForm) els.registerForm.onsubmit = registerUser;
      const uid = localStorage.getItem("pulsar_uid");
      if (uid && db) {
        const snap = await db.ref(`users/${uid}`).get();
        if (snap.exists()) {
          currentUser = snap.val();
          await enterApp();
        }
      }
    })();
  </script>
</body>
</html>
